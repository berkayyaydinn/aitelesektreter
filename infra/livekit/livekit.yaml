# Self-host LiveKit server config. Anahtarlar LIVEKIT_KEYS env'inden gelir (compose).
# docker-compose.yml `livekit` servisi bunu /etc/livekit.yaml olarak mount eder.

port: 7880                 # WebSocket/HTTP — agent + SIP buraya bağlanır
rtc:
  tcp_port: 7881           # RTC over TCP (UDP engelliyse fallback)
  port_range_start: 50000  # RTC medya UDP aralığı — compose + firewall ile eşleşmeli
  port_range_end: 60000
  use_external_ip: false   # STUN kapalı — konteyner DNS'i STUN hostlarını çözemiyor
  node_ip: 69.62.107.51    # VPS public IP (SDP'ye elle yazılır)

redis:
  address: redis:6379      # server + SIP durum paylaşımı (zorunlu)

logging:
  level: info

# Not: keys burada YOK — LIVEKIT_KEYS env ile verilir (sır config dosyasına yazılmaz).
# Anahtar üret: `docker run --rm livekit/livekit-server generate-keys`
