# Prod override (bulut AI + PostgreSQL, CRM'siz, kayıtsız).
# docker compose bu dosyayı otomatik yükler. Gerektirir Docker Compose v2.24+ (!reset/!override).
#
# Devre dışı bırakılanlar (profil atanınca varsayılan `up` başlatmaz):
#   mysql (CRM yok), whisper-stt/piper-tts (bulut STT/TTS), minio/minio-init/livekit-egress (kayıt kapalı),
#   caddy (sunucuda 80/443'ü mevcut nginx kullanıyor — API vhost nginx'te, TLS certbot).
# Etkin kalanlar: postgres, backend, voice-agent, redis, livekit, livekit-sip, backup.

services:
  backend:
    ports:
      - "127.0.0.1:8080:8080"   # nginx reverse proxy hedefi (dışarı kapalı)
    depends_on: !reset
      postgres:
        condition: service_healthy

  voice-agent:
    depends_on: !reset
      - backend
      - livekit

  backup:
    environment:
      BACKUP_MYSQL: "false"
    depends_on: !reset
      postgres:
        condition: service_healthy

  mysql:
    profiles: ["crm"]

  whisper-stt:
    profiles: ["selfhost-ai"]

  piper-tts:
    profiles: ["selfhost-ai"]

  minio:
    profiles: ["recording"]

  minio-init:
    profiles: ["recording"]

  livekit-egress:
    profiles: ["recording"]

  caddy:
    profiles: ["proxy-caddy"]

  # Docker'ın yayınladığı portlar UFW'yi bypass eder — LiveKit WS/TCP dışarı kapalı olsun.
  # dns: host'un systemd-resolved stub'ı (127.0.0.53) konteynere kopyalanınca çözümleme
  # kırılıyordu; açık upstream ver (embedded DNS 127.0.0.11 servis adlarını çözmeye devam eder).
  livekit:
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports: !override
      - "127.0.0.1:7880:7880"
      - "127.0.0.1:7881:7881"
      - "50000-60000:50000-60000/udp"

  livekit-sip:
    dns:
      - 1.1.1.1
      - 8.8.8.8
