# Prod override (bulut AI + PostgreSQL, CRM'siz, kayıtsız).
# docker compose bu dosyayı otomatik yükler. Gerektirir Docker Compose v2.24+ (!reset/!override).
#
# Devre dışı bırakılanlar (profil atanınca varsayılan `up` başlatmaz):
#   mysql (CRM yok), whisper-stt/piper-tts (bulut STT/TTS), minio/minio-init/livekit-egress (kayıt kapalı),
#   caddy (sunucuda 80/443'ü mevcut nginx kullanıyor — API vhost nginx'te, TLS certbot).
# Etkin kalanlar: postgres, backend, voice-agent, redis, livekit, livekit-sip, backup.

services:
  backend:
    ports:
      - "127.0.0.1:8080:8080"   # nginx reverse proxy hedefi (dışarı kapalı)
    depends_on: !reset
      postgres:
        condition: service_healthy

  # voice-agent bridge ağında; host ağındaki LiveKit'e gateway üzerinden ulaşır.
  voice-agent:
    environment:
      LIVEKIT_URL: ws://host.docker.internal:7880
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !reset
      - backend
      - livekit

  backup:
    environment:
      BACKUP_MYSQL: "false"
    depends_on: !reset
      postgres:
        condition: service_healthy

  mysql:
    profiles: ["crm"]

  whisper-stt:
    profiles: ["selfhost-ai"]

  piper-tts:
    profiles: ["selfhost-ai"]

  minio:
    profiles: ["recording"]

  minio-init:
    profiles: ["recording"]

  livekit-egress:
    profiles: ["recording"]

  caddy:
    profiles: ["proxy-caddy"]

  # LiveKit + SIP host network modunda çalışır (LiveKit'in önerdiği self-host kurulumu):
  #  - 10k+ UDP portunu docker-proxy ile tek tek publish etmek sunucuyu çökertiyor,
  #  - 50000-60000 aralığı Linux ephemeral portlarıyla çakışıp bind hatası veriyordu.
  # Host modunda config'ler 127.0.0.1 üzerinden konuşur (livekit.yaml / sip.yaml).
  # Dış erişim UFW ile sınırlı: 7880/7881 dışarı kapalı, RTC/RTP/SIP kuralları mevcut.
  livekit:
    network_mode: host
    ports: !reset []

  livekit-sip:
    network_mode: host
    ports: !reset []

  # Host ağındaki LiveKit'in redis'e erişimi için 127.0.0.1'e publish.
  redis:
    ports:
      - "127.0.0.1:6379:6379"
